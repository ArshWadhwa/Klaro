# Production Configuration
# Database Configuration (PostgreSQL) - Use environment variables in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/klaro?prepareThreshold=0}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheSizeMiB=0
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_MIN_IDLE:2}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_MAX_LIFETIME_MS:1800000}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:migration
spring.flyway.validate-on-migrate=${FLYWAY_VALIDATE_ON_MIGRATE:false}
# Skip sample data in production
spring.flyway.skip-default-callbacks=false

# Multipart upload limits
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:25MB}

# Server Configuration
server.port=${PORT:8080}

# JWT Configuration - Use environment variable in production
jwt.secret=${JWT_SECRET:}

# OpenRouter Configuration
openrouter.api.key=${OPENROUTER_API_KEY:}
openrouter.api.url=${OPENROUTER_API_URL:https://openrouter.ai/api/v1/chat/completions}
openrouter.site.url=${OPENROUTER_SITE_URL:http://localhost:8080}
openrouter.site.name=${OPENROUTER_SITE_NAME:Klaro}

# Groq AI Configuration
groq.api.key=${GROQ_API_KEY:}

# HuggingFace Configuration
huggingface.api.key=${HUGGINGFACE_API_KEY:}

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY:}

# AI tuning
ai.max-tokens=${AI_MAX_TOKENS:3072}

# CORS Configuration
cors.allowed.origins=${CORS_ORIGINS:http://127.0.0.1:5501,http://localhost:3000}

# Logging Configuration
logging.level.org.springframework.security=WARN
logging.level.org.example=INFO
logging.level.org.flywaydb=INFO
logging.level.root=INFO

# Application Information
info.app.name=Klaro - Collaborative Project Management System
info.app.description=A comprehensive collaborative project management system
info.app.version=1.0.0
